<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luxury Hotel</title>  <!-- AOS Animation -->  <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">  <style>
    :root {
      --bg: #ffffff;
      --text: #111;
      --glass: rgba(255,255,255,0.2);
    }

    body.dark {
      --bg: #0f172a;
      --text: #f1f5f9;
      --glass: rgba(0,0,0,0.3);
    }

    * {margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

    body {
      background: var(--bg);
      color: var(--text);
      transition: 0.4s;
    }

    nav {
      position: fixed;
      top:0;
      width:100%;
      display:flex;
      justify-content:space-between;
      padding:15px 30px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      z-index:1000;
    }

    nav a {margin:0 10px;text-decoration:none;color:var(--text)}

    .hero {
      height:100vh;
      overflow:hidden;
      position:relative;
    }

    .slides {
      display:flex;
      width:300%;
      animation: slide 15s infinite;
    }

    .slide {
      width:100%;
      height:100vh;
      background-size:cover;
      background-position:center;
    }

    @keyframes slide {
      0%{transform:translateX(0)}
      33%{transform:translateX(-100%)}
      66%{transform:translateX(-200%)}
      100%{transform:translateX(0)}
    }

    .hero-content {
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      text-align:center;
      color:#fff;
    }

    .btn {
      padding:12px 25px;
      border:none;
      background:#000;
      color:#fff;
      cursor:pointer;
      margin-top:15px;
      border-radius:30px;
    }

    section {padding:80px 20px}

    .gallery {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:15px;
    }

    .gallery img {
      width:100%;
      border-radius:15px;
      cursor:pointer;
      transition:0.3s;
    }

    .gallery img:hover {transform:scale(1.05)}

    .lightbox {
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      align-items:center;
      justify-content:center;
    }

    .lightbox img {max-width:90%;max-height:90%}

    iframe {width:100%;height:400px;border:0}

    form input, form textarea {
      width:100%;padding:10px;margin:10px 0;border-radius:10px;border:1px solid #ccc
    }

    @media(max-width:768px){
      nav {flex-direction:column}
    }
  </style></head>
<body><nav>
